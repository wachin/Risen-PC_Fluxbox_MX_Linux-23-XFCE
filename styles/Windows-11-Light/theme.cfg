style.name:                          Windows 11 Light
style.author:                        Codex for Wachin
style.date:                          2026-07-15
style.comments:                      Windows 11 light inspired Fluxbox theme with soft white chrome, blue focus, and subtle gray borders.

background:                          Flat Solid
background.color:                    #f3f3f3

! Fonts
window.font:                         Noto Sans-10:bold
menu.frame.font:                     Noto Sans-10
menu.title.font:                     Noto Sans-10:bold
toolbar.font:                        Noto Sans-10
toolbar.clock.font:                  Noto Sans-10:bold
toolbar.workspace.font:              Noto Sans-10:bold
toolbar.iconbar.focused.font:        Noto Sans-10:bold
toolbar.iconbar.unfocused.font:      Noto Sans-10

! Palette inspired by Windows 11 light mode.
! canvas #f3f3f3, panel #ffffff, chrome #f9f9f9, line #d0d0d0,
! text #1a1a1a, muted #5f6368, accent #0078d4, accent-soft #d7ecff

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #ffffff
toolbar.colorTo:                     #ececec
toolbar.textColor:                   #1a1a1a
toolbar.justify:                     Center
toolbar.height:                      28

toolbar.button:                      Flat Solid
toolbar.button.color:                #f9f9f9
toolbar.button.picColor:             #3a3a3a
toolbar.button.pressed:              Flat Solid
toolbar.button.pressed.color:        #cfe8ff
toolbar.button.pressed.picColor:     #004c87

toolbar.label:                       Flat Solid
toolbar.label.color:                 #f9f9f9
toolbar.label.textColor:             #1a1a1a

toolbar.windowLabel:                 Flat Solid
toolbar.windowLabel.color:           #f3f3f3
toolbar.windowLabel.textColor:       #3f3f3f

toolbar.clock:                       Flat Solid
toolbar.clock.color:                 #f9f9f9
toolbar.clock.textColor:             #202020

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #d7ecff
toolbar.iconbar.focused.colorTo:     #b7dcfb
toolbar.iconbar.focused.textColor:   #003e70
toolbar.iconbar.focused.borderWidth: 1
toolbar.iconbar.focused.borderColor: #0078d4

toolbar.iconbar.unfocused:           Flat Solid
toolbar.iconbar.unfocused.color:     #f6f6f6
toolbar.iconbar.unfocused.textColor: #5f6368
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.borderColor: #d0d0d0

toolbar.iconbar.empty:               Flat Solid
toolbar.iconbar.empty.color:         #ededed
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Solid
menu.frame.color:                    #ffffff
menu.frame.textColor:                #1a1a1a
menu.frame.disableColor:             #9a9a9a
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #fdfdfd
menu.title.colorTo:                  #ededed
menu.title.textColor:                #1a1a1a
menu.title.justify:                  Center

menu.hilite:                         Flat Solid
menu.hilite.color:                   #d7ecff
menu.hilite.textColor:               #003e70

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     26
menu.titleHeight:                    28
menu.bevelWidth:                     0
menu.borderWidth:                    1
menu.borderColor:                    #d0d0d0
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 28
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #ffffff
window.title.focus.colorTo:          #e9f5ff
window.title.unfocus:                Flat Gradient Vertical
window.title.unfocus.color:          #fafafa
window.title.unfocus.colorTo:        #eeeeee

window.label.focus:                  Flat Solid
window.label.focus.color:            #ffffff
window.label.focus.textColor:        #1a1a1a
window.label.unfocus:                Flat Solid
window.label.unfocus.color:          #f4f4f4
window.label.unfocus.textColor:      #6a6a6a

window.button.focus:                 Flat Solid
window.button.focus.color:           #ffffff
window.button.focus.picColor:        #323232
window.button.unfocus:               Flat Solid
window.button.unfocus.color:         #f4f4f4
window.button.unfocus.picColor:      #7a7a7a
window.button.pressed:               Flat Solid
window.button.pressed.color:         #c42b1c
window.button.pressed.picColor:      #ffffff

window.handle.focus:                 Flat Solid
window.handle.focus.color:           #e9f5ff
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #eeeeee

window.grip.focus:                   Flat Solid
window.grip.focus.color:             #0078d4
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #cfcfcf

window.frame.focusColor:             #91c9f7
window.frame.unfocusColor:           #d0d0d0

window.tab.justify:                  Center
window.tab.label.focus:              Flat Solid
window.tab.label.focus.color:        #d7ecff
window.tab.label.focus.textColor:    #003e70
window.tab.label.unfocus:            Flat Solid
window.tab.label.unfocus.color:      #f4f4f4
window.tab.label.unfocus.textColor:  #5f6368
window.tab.borderWidth:              1
window.tab.borderColor:              #d0d0d0

borderColor:                         #91c9f7
borderWidth:                         1
bevelWidth:                          0
frameWidth:                          1
handleWidth:                         4
