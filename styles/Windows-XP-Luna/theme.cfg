style.name:                          Windows XP Luna
style.author:                        Codex for Wachin
style.date:                          2026-07-14
style.comments:                      Windows XP Luna inspired Fluxbox theme with blue chrome, green start-era accents, and comfortable sizing.

background:                          Flat Solid
background.color:                    #3a6ea5

! Fonts
window.font:                         Noto Sans-10:bold
menu.frame.font:                     Noto Sans-10
menu.title.font:                     Noto Sans-10:bold
toolbar.font:                        Noto Sans-10
toolbar.clock.font:                  Noto Sans-10:bold
toolbar.workspace.font:              Noto Sans-10:bold
toolbar.iconbar.focused.font:        Noto Sans-10:bold
toolbar.iconbar.unfocused.font:      Noto Sans-10

! Palette inspired by Windows XP Luna.
! royal #245edc, bright #3c8cff, deep #003caa, pale #ece9d8,
! green #6bbf36, orange #f6a13a, red #d23b2d, text #102040.

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #3c8cff
toolbar.colorTo:                     #245edc
toolbar.textColor:                   #ffffff
toolbar.justify:                     Center
toolbar.height:                      28

toolbar.button:                      Flat Gradient Vertical
toolbar.button.color:                #7fb6ff
toolbar.button.colorTo:              #245edc
toolbar.button.picColor:             #ffffff
toolbar.button.pressed:              Flat Gradient Vertical
toolbar.button.pressed.color:        #f6a13a
toolbar.button.pressed.colorTo:      #d97706
toolbar.button.pressed.picColor:     #102040

toolbar.label:                       Flat Gradient Vertical
toolbar.label.color:                 #4c9cff
toolbar.label.colorTo:               #245edc
toolbar.label.textColor:             #ffffff

toolbar.windowLabel:                 Flat Gradient Vertical
toolbar.windowLabel.color:           #2f7df0
toolbar.windowLabel.colorTo:         #1749b8
toolbar.windowLabel.textColor:       #ffffff

toolbar.clock:                       Flat Gradient Vertical
toolbar.clock.color:                 #1f66d3
toolbar.clock.colorTo:               #003caa
toolbar.clock.textColor:             #ffffff

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #f6d98b
toolbar.iconbar.focused.colorTo:     #f6a13a
toolbar.iconbar.focused.textColor:   #102040
toolbar.iconbar.focused.borderWidth: 1
toolbar.iconbar.focused.borderColor: #fff5c8

toolbar.iconbar.unfocused:           Flat Gradient Vertical
toolbar.iconbar.unfocused.color:     #7fb6ff
toolbar.iconbar.unfocused.colorTo:   #2f7df0
toolbar.iconbar.unfocused.textColor: #ffffff
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.borderColor: #0b3f9f

toolbar.iconbar.empty:               Flat Gradient Vertical
toolbar.iconbar.empty.color:         #4c9cff
toolbar.iconbar.empty.colorTo:       #1749b8
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Solid
menu.frame.color:                    #ece9d8
menu.frame.textColor:                #102040
menu.frame.disableColor:             #8a8a78
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #3c8cff
menu.title.colorTo:                  #003caa
menu.title.textColor:                #ffffff
menu.title.justify:                  Center

menu.hilite:                         Flat Gradient Vertical
menu.hilite.color:                   #f6d98b
menu.hilite.colorTo:                 #f6a13a
menu.hilite.textColor:               #102040

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     26
menu.titleHeight:                    28
menu.bevelWidth:                     1
menu.borderWidth:                    1
menu.borderColor:                    #0b3f9f
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 28
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #5aa6ff
window.title.focus.colorTo:          #003caa
window.title.unfocus:                Flat Gradient Vertical
window.title.unfocus.color:          #9bbbe8
window.title.unfocus.colorTo:        #5d7faa

window.label.focus:                  Flat Gradient Vertical
window.label.focus.color:            #3c8cff
window.label.focus.colorTo:          #003caa
window.label.focus.textColor:        #ffffff
window.label.unfocus:                Flat Gradient Vertical
window.label.unfocus.color:          #9bbbe8
window.label.unfocus.colorTo:        #5d7faa
window.label.unfocus.textColor:      #eaf3ff

window.button.focus:                 Flat Gradient Vertical
window.button.focus.color:           #7fb6ff
window.button.focus.colorTo:         #245edc
window.button.focus.picColor:        #ffffff
window.button.unfocus:               Flat Gradient Vertical
window.button.unfocus.color:         #9bbbe8
window.button.unfocus.colorTo:       #5d7faa
window.button.unfocus.picColor:      #eaf3ff
window.button.pressed:               Flat Gradient Vertical
window.button.pressed.color:         #ff7568
window.button.pressed.colorTo:       #d23b2d
window.button.pressed.picColor:      #ffffff

window.handle.focus:                 Flat Gradient Vertical
window.handle.focus.color:           #245edc
window.handle.focus.colorTo:         #003caa
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #5d7faa

window.grip.focus:                   Flat Gradient Vertical
window.grip.focus.color:             #6bbf36
window.grip.focus.colorTo:           #3f8f20
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #5d7faa

window.frame.focusColor:             #0b3f9f
window.frame.unfocusColor:           #5d7faa

window.tab.justify:                  Center
window.tab.label.focus:              Flat Gradient Vertical
window.tab.label.focus.color:        #f6d98b
window.tab.label.focus.colorTo:      #f6a13a
window.tab.label.focus.textColor:    #102040
window.tab.label.unfocus:            Flat Gradient Vertical
window.tab.label.unfocus.color:      #7fb6ff
window.tab.label.unfocus.colorTo:    #2f7df0
window.tab.label.unfocus.textColor:  #ffffff
window.tab.borderWidth:              1
window.tab.borderColor:              #0b3f9f

borderColor:                         #0b3f9f
borderWidth:                         1
bevelWidth:                          1
frameWidth:                          1
handleWidth:                         4
