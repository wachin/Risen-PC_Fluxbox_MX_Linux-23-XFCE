style.name:                          Modern Clear Dusk Small
style.author:                        Codex for Wachin
style.date:                          2026-07-14
style.comments:                      Small modern Fluxbox theme with compact titlebar, text, and taskbar footprint.

background:                          Flat Solid
background.color:                    #1f2426

! Fonts
window.font:                         Noto Sans-8:bold
menu.frame.font:                     Noto Sans-8
menu.title.font:                     Noto Sans-8:bold
toolbar.font:                        Noto Sans-8
toolbar.clock.font:                  Noto Sans-8:bold
toolbar.workspace.font:              Noto Sans-8:bold
toolbar.iconbar.focused.font:        Noto Sans-8:bold
toolbar.iconbar.unfocused.font:      Noto Sans-8

! Palette
! base #1f2426, panel #2b3032, soft #3a4142, text #edf1ec,
! muted #a8b3ad, teal #20b2a6, coral #e76f51, gold #d6a84f

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #2f3536
toolbar.colorTo:                     #202527
toolbar.textColor:                   #edf1ec
toolbar.justify:                     Center
toolbar.height:                      22

toolbar.button:                      Flat Solid
toolbar.button.color:                #2b3032
toolbar.button.picColor:             #20b2a6
toolbar.button.pressed:              Flat Solid
toolbar.button.pressed.color:        #20b2a6
toolbar.button.pressed.picColor:     #101414

toolbar.label:                       Flat Solid
toolbar.label.color:                 #2b3032
toolbar.label.textColor:             #edf1ec

toolbar.windowLabel:                 Flat Solid
toolbar.windowLabel.color:           #252b2d
toolbar.windowLabel.textColor:       #a8b3ad

toolbar.clock:                       Flat Solid
toolbar.clock.color:                 #252b2d
toolbar.clock.textColor:             #d6a84f

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #20b2a6
toolbar.iconbar.focused.colorTo:     #157d77
toolbar.iconbar.focused.textColor:   #f7fbf9
toolbar.iconbar.focused.borderWidth: 0

toolbar.iconbar.unfocused:           Flat Solid
toolbar.iconbar.unfocused.color:     #2b3032
toolbar.iconbar.unfocused.textColor: #a8b3ad
toolbar.iconbar.unfocused.borderWidth: 0

toolbar.iconbar.empty:               Flat Solid
toolbar.iconbar.empty.color:         #252b2d
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Solid
menu.frame.color:                    #252b2d
menu.frame.textColor:                #edf1ec
menu.frame.disableColor:             #65706b
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #3a4142
menu.title.colorTo:                  #252b2d
menu.title.textColor:                #edf1ec
menu.title.justify:                  Center

menu.hilite:                         Flat Solid
menu.hilite.color:                   #20b2a6
menu.hilite.textColor:               #101414

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     21
menu.titleHeight:                    22
menu.bevelWidth:                     0
menu.borderWidth:                    1
menu.borderColor:                    #111516
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 21
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #343b3d
window.title.focus.colorTo:          #1d2224
window.title.unfocus:                Flat Solid
window.title.unfocus.color:          #252b2d

window.label.focus:                  Flat Solid
window.label.focus.color:            #343b3d
window.label.focus.textColor:        #edf1ec
window.label.unfocus:                Flat Solid
window.label.unfocus.color:          #252b2d
window.label.unfocus.textColor:      #87918c

window.button.focus:                 Flat Solid
window.button.focus.color:           #343b3d
window.button.focus.picColor:        #20b2a6
window.button.unfocus:               Flat Solid
window.button.unfocus.color:         #252b2d
window.button.unfocus.picColor:      #65706b
window.button.pressed:               Flat Solid
window.button.pressed.color:         #e76f51
window.button.pressed.picColor:      #101414

window.handle.focus:                 Flat Solid
window.handle.focus.color:           #1d2224
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #1d2224

window.grip.focus:                   Flat Solid
window.grip.focus.color:             #20b2a6
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #3a4142

window.frame.focusColor:             #111516
window.frame.unfocusColor:           #15191a

window.tab.justify:                  Center
window.tab.label.focus:              Flat Solid
window.tab.label.focus.color:        #20b2a6
window.tab.label.focus.textColor:    #101414
window.tab.label.unfocus:            Flat Solid
window.tab.label.unfocus.color:      #2b3032
window.tab.label.unfocus.textColor:  #a8b3ad
window.tab.borderWidth:              1
window.tab.borderColor:              #111516

borderColor:                         #111516
borderWidth:                         1
bevelWidth:                          0
frameWidth:                          1
handleWidth:                         2
