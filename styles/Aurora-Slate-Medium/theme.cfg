style.name:                          Aurora Slate Medium
style.author:                        Codex for Wachin
style.date:                          2026-07-14
style.comments:                      Medium aurora-inspired Fluxbox theme with slate chrome, green focus, and warm accents.

background:                          Flat Solid
background.color:                    #182024

! Fonts
window.font:                         Noto Sans-9:bold
menu.frame.font:                     Noto Sans-9
menu.title.font:                     Noto Sans-9:bold
toolbar.font:                        Noto Sans-9
toolbar.clock.font:                  Noto Sans-9:bold
toolbar.workspace.font:              Noto Sans-9:bold
toolbar.iconbar.focused.font:        Noto Sans-9:bold
toolbar.iconbar.unfocused.font:      Noto Sans-9

! Palette: slate #182024, panel #253036, soft #344249, aurora #58d68d,
! deep aurora #1f9f72, amber #f3c969, coral #ff6f61, text #edf6f2.

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #344249
toolbar.colorTo:                     #1b252a
toolbar.textColor:                   #edf6f2
toolbar.justify:                     Center
toolbar.height:                      24

toolbar.button:                      Flat Solid
toolbar.button.color:                #253036
toolbar.button.picColor:             #58d68d
toolbar.button.pressed:              Flat Solid
toolbar.button.pressed.color:        #58d68d
toolbar.button.pressed.picColor:     #101719

toolbar.label:                       Flat Solid
toolbar.label.color:                 #253036
toolbar.label.textColor:             #edf6f2

toolbar.windowLabel:                 Flat Solid
toolbar.windowLabel.color:           #1f2a30
toolbar.windowLabel.textColor:       #b9c9c1

toolbar.clock:                       Flat Solid
toolbar.clock.color:                 #1f2a30
toolbar.clock.textColor:             #f3c969

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #58d68d
toolbar.iconbar.focused.colorTo:     #1f9f72
toolbar.iconbar.focused.textColor:   #101719
toolbar.iconbar.focused.borderWidth: 1
toolbar.iconbar.focused.borderColor: #9ff2c3

toolbar.iconbar.unfocused:           Flat Gradient Vertical
toolbar.iconbar.unfocused.color:     #2b3840
toolbar.iconbar.unfocused.colorTo:   #1f2a30
toolbar.iconbar.unfocused.textColor: #b9c9c1
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.borderColor: #111719

toolbar.iconbar.empty:               Flat Solid
toolbar.iconbar.empty.color:         #1f2a30
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Solid
menu.frame.color:                    #1f2a30
menu.frame.textColor:                #edf6f2
menu.frame.disableColor:             #6f8079
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #3b4a52
menu.title.colorTo:                  #202b31
menu.title.textColor:                #edf6f2
menu.title.justify:                  Center

menu.hilite:                         Flat Gradient Vertical
menu.hilite.color:                   #58d68d
menu.hilite.colorTo:                 #1f9f72
menu.hilite.textColor:               #101719

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     23
menu.titleHeight:                    24
menu.bevelWidth:                     0
menu.borderWidth:                    1
menu.borderColor:                    #101719
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 24
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #3b4a52
window.title.focus.colorTo:          #1b252a
window.title.unfocus:                Flat Solid
window.title.unfocus.color:          #202b31

window.label.focus:                  Flat Solid
window.label.focus.color:            #344249
window.label.focus.textColor:        #edf6f2
window.label.unfocus:                Flat Solid
window.label.unfocus.color:          #202b31
window.label.unfocus.textColor:      #8fa19a

window.button.focus:                 Flat Solid
window.button.focus.color:           #344249
window.button.focus.picColor:        #58d68d
window.button.unfocus:               Flat Solid
window.button.unfocus.color:         #202b31
window.button.unfocus.picColor:      #6f8079
window.button.pressed:               Flat Solid
window.button.pressed.color:         #ff6f61
window.button.pressed.picColor:      #101719

window.handle.focus:                 Flat Solid
window.handle.focus.color:           #182024
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #182024

window.grip.focus:                   Flat Solid
window.grip.focus.color:             #58d68d
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #344249

window.frame.focusColor:             #101719
window.frame.unfocusColor:           #141c1f

window.tab.justify:                  Center
window.tab.label.focus:              Flat Solid
window.tab.label.focus.color:        #58d68d
window.tab.label.focus.textColor:    #101719
window.tab.label.unfocus:            Flat Solid
window.tab.label.unfocus.color:      #253036
window.tab.label.unfocus.textColor:  #b9c9c1
window.tab.borderWidth:              1
window.tab.borderColor:              #101719

borderColor:                         #101719
borderWidth:                         1
bevelWidth:                          0
frameWidth:                          1
handleWidth:                         3
