style.name:                          macOS Aqua Medium
style.author:                        Codex for Wachin
style.date:                          2026-07-14
style.comments:                      Medium macOS-inspired Fluxbox theme with light chrome, blue focus, and compact controls.

background:                          Flat Solid
background.color:                    #dfe6ec

! Fonts
window.font:                         Noto Sans-9:bold
menu.frame.font:                     Noto Sans-9
menu.title.font:                     Noto Sans-9:bold
toolbar.font:                        Noto Sans-9
toolbar.clock.font:                  Noto Sans-9:bold
toolbar.workspace.font:              Noto Sans-9:bold
toolbar.iconbar.focused.font:        Noto Sans-9:bold
toolbar.iconbar.unfocused.font:      Noto Sans-9

! Palette inspired by classic macOS Aqua and modern light macOS chrome.
! chrome #edf1f5, metal #cbd5dd, shadow #8c9aa6, focus #0a84ff,
! focus-dark #0060c8, text #1d2430, muted #5f6c78, close #ff5f57

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #f7f9fb
toolbar.colorTo:                     #cbd5dd
toolbar.textColor:                   #1d2430
toolbar.justify:                     Center
toolbar.height:                      24

toolbar.button:                      Flat Gradient Vertical
toolbar.button.color:                #ffffff
toolbar.button.colorTo:              #cbd5dd
toolbar.button.picColor:             #4d5a66
toolbar.button.pressed:              Flat Gradient Vertical
toolbar.button.pressed.color:        #0a84ff
toolbar.button.pressed.colorTo:      #0060c8
toolbar.button.pressed.picColor:     #ffffff

toolbar.label:                       Flat Gradient Vertical
toolbar.label.color:                 #ffffff
toolbar.label.colorTo:               #dbe3ea
toolbar.label.textColor:             #1d2430

toolbar.windowLabel:                 Flat Gradient Vertical
toolbar.windowLabel.color:           #edf1f5
toolbar.windowLabel.colorTo:         #cbd5dd
toolbar.windowLabel.textColor:       #5f6c78

toolbar.clock:                       Flat Gradient Vertical
toolbar.clock.color:                 #ffffff
toolbar.clock.colorTo:               #dbe3ea
toolbar.clock.textColor:             #1d2430

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #5eb6ff
toolbar.iconbar.focused.colorTo:     #0a84ff
toolbar.iconbar.focused.textColor:   #ffffff
toolbar.iconbar.focused.borderWidth: 1
toolbar.iconbar.focused.borderColor: #e7f4ff

toolbar.iconbar.unfocused:           Flat Gradient Vertical
toolbar.iconbar.unfocused.color:     #f7f9fb
toolbar.iconbar.unfocused.colorTo:   #cbd5dd
toolbar.iconbar.unfocused.textColor: #4d5a66
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.borderColor: #aebac4

toolbar.iconbar.empty:               Flat Gradient Vertical
toolbar.iconbar.empty.color:         #edf1f5
toolbar.iconbar.empty.colorTo:       #c0ccd6
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Solid
menu.frame.color:                    #f7f9fb
menu.frame.textColor:                #1d2430
menu.frame.disableColor:             #98a4af
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #ffffff
menu.title.colorTo:                  #cbd5dd
menu.title.textColor:                #1d2430
menu.title.justify:                  Center

menu.hilite:                         Flat Gradient Vertical
menu.hilite.color:                   #5eb6ff
menu.hilite.colorTo:                 #0a84ff
menu.hilite.textColor:               #ffffff

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     23
menu.titleHeight:                    24
menu.bevelWidth:                     1
menu.borderWidth:                    1
menu.borderColor:                    #aebac4
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 24
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #ffffff
window.title.focus.colorTo:          #b9c5cf
window.title.unfocus:                Flat Gradient Vertical
window.title.unfocus.color:          #edf1f5
window.title.unfocus.colorTo:        #c7d1da

window.label.focus:                  Flat Gradient Vertical
window.label.focus.color:            #f7f9fb
window.label.focus.colorTo:          #cbd5dd
window.label.focus.textColor:        #1d2430
window.label.unfocus:                Flat Gradient Vertical
window.label.unfocus.color:          #e5ebf0
window.label.unfocus.colorTo:        #c7d1da
window.label.unfocus.textColor:      #697681

window.button.focus:                 Flat Gradient Vertical
window.button.focus.color:           #ffffff
window.button.focus.colorTo:         #cbd5dd
window.button.focus.picColor:        #ff5f57
window.button.unfocus:               Flat Gradient Vertical
window.button.unfocus.color:         #edf1f5
window.button.unfocus.colorTo:       #c7d1da
window.button.unfocus.picColor:      #8c9aa6
window.button.pressed:               Flat Gradient Vertical
window.button.pressed.color:         #ff5f57
window.button.pressed.colorTo:       #bf2d24
window.button.pressed.picColor:      #ffffff

window.handle.focus:                 Flat Gradient Vertical
window.handle.focus.color:           #cbd5dd
window.handle.focus.colorTo:         #aebac4
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #c7d1da

window.grip.focus:                   Flat Gradient Vertical
window.grip.focus.color:             #5eb6ff
window.grip.focus.colorTo:           #0a84ff
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #aebac4

window.frame.focusColor:             #8c9aa6
window.frame.unfocusColor:           #aebac4

window.tab.justify:                  Center
window.tab.label.focus:              Flat Gradient Vertical
window.tab.label.focus.color:        #5eb6ff
window.tab.label.focus.colorTo:      #0a84ff
window.tab.label.focus.textColor:    #ffffff
window.tab.label.unfocus:            Flat Gradient Vertical
window.tab.label.unfocus.color:      #edf1f5
window.tab.label.unfocus.colorTo:    #cbd5dd
window.tab.label.unfocus.textColor:  #4d5a66
window.tab.borderWidth:              1
window.tab.borderColor:              #aebac4

borderColor:                         #8c9aa6
borderWidth:                         1
bevelWidth:                          1
frameWidth:                          1
handleWidth:                         3
