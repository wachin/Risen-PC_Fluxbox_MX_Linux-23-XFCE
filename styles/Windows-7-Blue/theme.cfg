style.name:                          Windows 7 Blue
style.author:                        Codex for Wachin
style.date:                          2026-07-14
style.comments:                      Windows 7 inspired blue Fluxbox theme with comfortable titlebar and toolbar sizing.

background:                          Flat Solid
background.color:                    #d7e7f7

! Fonts
window.font:                         Noto Sans-10:bold
menu.frame.font:                     Noto Sans-10
menu.title.font:                     Noto Sans-10:bold
toolbar.font:                        Noto Sans-10
toolbar.clock.font:                  Noto Sans-10:bold
toolbar.workspace.font:              Noto Sans-10:bold
toolbar.iconbar.focused.font:        Noto Sans-10:bold
toolbar.iconbar.unfocused.font:      Noto Sans-10

! Palette inspired by the default Windows 7 blue glass look.
! glass #d7e7f7, chrome #74a8d8, deep #1f5f9e, focus #0b78d0,
! highlight #66c8ff, text #0d1d2a, light #f4fbff

! Toolbar
toolbar:                             Flat Gradient Vertical
toolbar.color:                       #d8ecfb
toolbar.colorTo:                     #72a9da
toolbar.textColor:                   #0d1d2a
toolbar.justify:                     Center
toolbar.height:                      28

toolbar.button:                      Flat Gradient Vertical
toolbar.button.color:                #eef8ff
toolbar.button.colorTo:              #8dbfe7
toolbar.button.picColor:             #174f85
toolbar.button.pressed:              Flat Gradient Vertical
toolbar.button.pressed.color:        #1d8fe0
toolbar.button.pressed.colorTo:      #0b5c9f
toolbar.button.pressed.picColor:     #ffffff

toolbar.label:                       Flat Gradient Vertical
toolbar.label.color:                 #f4fbff
toolbar.label.colorTo:               #b9d9f0
toolbar.label.textColor:             #0d1d2a

toolbar.windowLabel:                 Flat Gradient Vertical
toolbar.windowLabel.color:           #d8ecfb
toolbar.windowLabel.colorTo:         #8dbfe7
toolbar.windowLabel.textColor:       #17334d

toolbar.clock:                       Flat Gradient Vertical
toolbar.clock.color:                 #eef8ff
toolbar.clock.colorTo:               #9fccec
toolbar.clock.textColor:             #0d3a61

toolbar.iconbar.focused:             Flat Gradient Vertical
toolbar.iconbar.focused.color:       #66c8ff
toolbar.iconbar.focused.colorTo:     #0b78d0
toolbar.iconbar.focused.textColor:   #ffffff
toolbar.iconbar.focused.borderWidth: 1
toolbar.iconbar.focused.borderColor: #d9f4ff

toolbar.iconbar.unfocused:           Flat Gradient Vertical
toolbar.iconbar.unfocused.color:     #d8ecfb
toolbar.iconbar.unfocused.colorTo:   #8dbfe7
toolbar.iconbar.unfocused.textColor: #17334d
toolbar.iconbar.unfocused.borderWidth: 1
toolbar.iconbar.unfocused.borderColor: #6b9ecb

toolbar.iconbar.empty:               Flat Gradient Vertical
toolbar.iconbar.empty.color:         #c6dff2
toolbar.iconbar.empty.colorTo:       #86b5dc
toolbar.iconbar.borderWidth:         0

! Menu
menu.frame:                          Flat Gradient Vertical
menu.frame.color:                    #f4fbff
menu.frame.colorTo:                  #c7e1f4
menu.frame.textColor:                #0d1d2a
menu.frame.disableColor:             #7f93a4
menu.frame.justify:                  Left

menu.title:                          Flat Gradient Vertical
menu.title.color:                    #74a8d8
menu.title.colorTo:                  #1f5f9e
menu.title.textColor:                #ffffff
menu.title.justify:                  Center

menu.hilite:                         Flat Gradient Vertical
menu.hilite.color:                   #66c8ff
menu.hilite.colorTo:                 #0b78d0
menu.hilite.textColor:               #ffffff

menu.bullet:                         triangle
menu.bullet.position:                Right
menu.itemHeight:                     26
menu.titleHeight:                    28
menu.bevelWidth:                     1
menu.borderWidth:                    1
menu.borderColor:                    #4c8fc5
menu.roundCorners:                   TopLeft TopRight BottomLeft BottomRight

! Windows
window.title.height:                 28
window.justify:                      Center

window.title.focus:                  Flat Gradient Vertical
window.title.focus.color:            #d9f2ff
window.title.focus.colorTo:          #2f86c9
window.title.unfocus:                Flat Gradient Vertical
window.title.unfocus.color:          #d6e4ef
window.title.unfocus.colorTo:        #8daac0

window.label.focus:                  Flat Gradient Vertical
window.label.focus.color:            #74a8d8
window.label.focus.colorTo:          #1f5f9e
window.label.focus.textColor:        #ffffff
window.label.unfocus:                Flat Gradient Vertical
window.label.unfocus.color:          #b8cedf
window.label.unfocus.colorTo:        #7c99ae
window.label.unfocus.textColor:      #eef7ff

window.button.focus:                 Flat Gradient Vertical
window.button.focus.color:           #eef8ff
window.button.focus.colorTo:         #7db9e8
window.button.focus.picColor:        #174f85
window.button.unfocus:               Flat Gradient Vertical
window.button.unfocus.color:         #c9dae8
window.button.unfocus.colorTo:       #8ba8bd
window.button.unfocus.picColor:      #50697c
window.button.pressed:               Flat Gradient Vertical
window.button.pressed.color:         #f2725d
window.button.pressed.colorTo:       #b51f16
window.button.pressed.picColor:      #ffffff

window.handle.focus:                 Flat Gradient Vertical
window.handle.focus.color:           #74a8d8
window.handle.focus.colorTo:         #1f5f9e
window.handle.unfocus:               Flat Solid
window.handle.unfocus.color:         #8daac0

window.grip.focus:                   Flat Gradient Vertical
window.grip.focus.color:             #66c8ff
window.grip.focus.colorTo:           #0b78d0
window.grip.unfocus:                 Flat Solid
window.grip.unfocus.color:           #7c99ae

window.frame.focusColor:             #3c8dc7
window.frame.unfocusColor:           #6f8ca2

window.tab.justify:                  Center
window.tab.label.focus:              Flat Gradient Vertical
window.tab.label.focus.color:        #66c8ff
window.tab.label.focus.colorTo:      #0b78d0
window.tab.label.focus.textColor:    #ffffff
window.tab.label.unfocus:            Flat Gradient Vertical
window.tab.label.unfocus.color:      #c7e1f4
window.tab.label.unfocus.colorTo:    #8dbfe7
window.tab.label.unfocus.textColor:  #17334d
window.tab.borderWidth:              1
window.tab.borderColor:              #4c8fc5

borderColor:                         #3c8dc7
borderWidth:                         1
bevelWidth:                          1
frameWidth:                          1
handleWidth:                         4
